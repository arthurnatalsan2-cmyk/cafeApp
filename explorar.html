<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Café App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="container-flex">

    <div class="sidebar">
        <h2 id="boasVindas" style="font-size: 1.2rem;">☕ Olá!</h2>
        <hr style="margin: 20px 0; opacity: 0.2;">
        
        <button onclick="window.location.href='explorar.html'" style="background: rgba(255,255,255,0.2); width: 100%; margin-bottom: 10px; text-align: left; padding-left: 20px;">
            🛒 Fazer Pedido
        </button>
        <button onclick="window.location.href='pedidos.html'" style="background: rgba(255,255,255,0.05); width: 100%; margin-bottom: 10px; text-align: left; padding-left: 20px;">
            📦 Meus Pedidos
        </button>
        
        <div id="areaAdmin" style="display: none;">
            <button onclick="window.location.href='admin.html'" style="background: #eac67a; color: #000; width: 100%; margin-bottom: 10px; text-align: left; padding-left: 20px; font-weight: bold;">
                🛠️ Painel Admin
            </button>
        </div>

        <button id="btnSair" style="margin-top: 50px; background: #ff4d4d; width: 100%;">🚪 Sair</button>
    </div>

    <div class="main-content" style="display: flex; gap: 30px; flex-wrap: wrap;">
        
        <div style="flex: 1; min-width: 300px;">
            <h2 style="margin-bottom: 20px;">Nosso Cardápio</h2>
            <div id="gridProdutos" class="grid-produtos" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));">
                </div>
        </div>

        <div class="card" style="width: 320px; height: fit-content; position: sticky; top: 30px;">
            <h3 style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 15px;">
                Seu Pedido
                <span id="badgeCarrinho" style="background: var(--verde-principal); color: white; padding: 2px 8px; border-radius: 20px; font-size: 14px;">0</span>
            </h3>
            
            <div id="listaCarrinho" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;">
                <p style="opacity: 0.5; text-align: center; margin: 20px 0;">O carrinho está vazio.</p>
            </div>
            
            <div style="border-top: 2px solid #eee; padding-top: 15px;">
                <label style="font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; display: block;">Forma de Pagamento:</label>
                <select id="metodoPagamento" style="width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd;">
                    <option value="Pix">Pix</option>
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                    <option value="Dinheiro">Dinheiro (na entrega)</option>
                </select>

                <h3 style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    Total: <span id="totalCarrinho" style="color: var(--verde-principal);">R$ 0,00</span>
                </h3>
                <button id="btnFinalizar" style="width: 100%; padding: 15px; font-size: 1.1rem;">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <div id="aviso"></div>

    <script type="module">
        import { db, ref, onValue, push } from "./firebase-config.js";

        // 1. VERIFICAÇÃO DE LOGIN
        const usuario = localStorage.getItem("usuario");
        if(!usuario) window.location.href = "login.html";
        document.getElementById("boasVindas").innerHTML = `☕ Olá, <b>${usuario}</b>!`;

        if(localStorage.getItem("isAdmin") === "true") {
            document.getElementById("areaAdmin").style.display = "block";
        }

        // 2. ESTADO DA APLICAÇÃO
        let produtosBD = []; // Lista que vem do Firebase
        let carrinho = JSON.parse(localStorage.getItem("carrinho_salvo")) || [];

        // 3. CARREGAR PRODUTOS DO FIREBASE (REAL-TIME)
        onValue(ref(db, 'produtos'), (snapshot) => {
            const data = snapshot.val();
            const div = document.getElementById("gridProdutos");
            div.innerHTML = "";
            produtosBD = [];

            if(!data) {
                div.innerHTML = "<p>Nenhum produto disponível.</p>";
                return;
            }

            Object.keys(data).forEach(key => {
                const p = data[key];
                const index = produtosBD.length;
                produtosBD.push(p);

                div.innerHTML += `
                    <div class="card" style="display: flex; flex-direction: column; justify-content: space-between; padding: 15px;">
                        <div style="width: 100%; height: 160px; border-radius: 10px; overflow: hidden; margin-bottom: 15px; background: #eee;">
                            <img src="${p.imagem}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div>
                            <h4 style="margin-bottom: 5px;">${p.nome}</h4>
                            <p style="color: var(--verde-principal); font-weight: 800; font-size: 1.2rem; margin-bottom: 15px;">R$ ${p.preco.toFixed(2)}</p>
                        </div>
                        <button onclick="addAoCarrinho(${index})" style="width: 100%;">+ Adicionar</button>
                    </div>`;
            });
        });

        // 4. FUNÇÕES DO CARRINHO
        window.addAoCarrinho = function(index) {
            carrinho.push(produtosBD[index]);
            renderCarrinho();
            mostrarAviso("Adicionado ao carrinho!");
        }

        function renderCarrinho() {
            const div = document.getElementById("listaCarrinho");
            let total = 0;
            document.getElementById("badgeCarrinho").innerText = carrinho.length;

            if (carrinho.length === 0) {
                div.innerHTML = "<p style='opacity: 0.5; text-align: center; margin: 20px 0;'>Vazio.</p>";
                document.getElementById("totalCarrinho").innerText = "R$ 0,00";
                return;
                localStorage.setItem("carrinho_salvo", JSON.stringify(carrinho));
            }

            div.innerHTML = "";
            carrinho.forEach((item) => {
                total += item.preco;
                div.innerHTML += `
                    <div style="display:flex; justify-content:space-between; margin-bottom: 8px; background: rgba(0,0,0,0.03); padding: 8px; border-radius: 5px;">
                        <span>${item.nome}</span> 
                        <b>R$ ${item.preco.toFixed(2)}</b>
                    </div>`;
            });
            document.getElementById("totalCarrinho").innerText = "R$ " + total.toFixed(2);
        }

        // 5. FINALIZAR PEDIDO (ENVIAR PARA FIREBASE)
        document.getElementById("btnFinalizar").onclick = function() {
            if(carrinho.length === 0) return mostrarAviso("Carrinho vazio!", "erro");

            const total = carrinho.reduce((acc, i) => acc + i.preco, 0);
            const formaPagamento = document.getElementById("metodoPagamento").value;

            const novoPedido = {
                usuario: usuario,
                itens: carrinho,
                total: total,
                status: "Preparando",
                pagamento: formaPagamento,
                data: new Date().toLocaleString()
            };

            push(ref(db, 'pedidos'), novoPedido).then(() => {
                mostrarAviso("Pedido enviado com sucesso! 🎉");
                carrinho = [];
                renderCarrinho();
                setTimeout(() => { window.location.href = "pedidos.html"; }, 1500);
            });
        }

        // 6. UTILITÁRIOS
        function mostrarAviso(msg, tipo = "sucesso") { 
            const a = document.getElementById("aviso"); 
            a.innerText = msg; 
            a.className = tipo === "erro" ? "mostrar erro" : "mostrar";
            setTimeout(() => a.className = "", 3000); 
        }

        document.getElementById("btnSair").onclick = () => {
            localStorage.clear();
            window.location.href = "login.html";
        };

    </script>
</body>
</html>
