<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recibo</title>
    <link rel="stylesheet" href="style.css">
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body>
    <div class="recibo">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: var(--verde-principal);">STARBUCKS</h2>
            <p>Comprovante de Pedido</p>
        </div>
        <div id="detalhes"></div>
        <button onclick="window.location.href='pedidos.html'" style="width: 100%; margin-top: 20px;">Voltar</button>
    </div>

    <script>
        const id = localStorage.getItem("pedidoAtual");
        const pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
        const p = pedidos.find(x => x.id == id);

        if(p) {
            document.getElementById("detalhes").innerHTML = `
                <p><b>ID:</b> #${p.id}</p>
                <p><b>Cliente:</b> ${p.usuario}</p>
                <p><b>Status:</b> ${p.status}</p>
                <hr style="margin: 10px 0; border: 0; border-top: 1px dashed #ccc;">
                <div>${p.itens.map(i => `<div>${i.nome} - R$ ${i.preco.toFixed(2)}</div>`).join("")}</div>
                <hr style="margin: 10px 0; border: 0; border-top: 1px dashed #ccc;">
                <h4>TOTAL: R$ ${p.total.toFixed(2)}</h4>
            `;
        }
    </script>
</body>
</html>
